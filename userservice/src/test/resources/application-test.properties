# H2 in-memory database for @DataJpaTest
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable mail auto-config in tests
spring.mail.host=
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# Stub values for required properties
rabbitmq.exchange=test.exchange
rabbitmq.audit.routingkey=test.audit.key
accounts.registration.enabled=false
slinkylinky.domain=http://localhost:3000
mail.from=test@example.com
