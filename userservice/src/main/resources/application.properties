spring.application.name=userservice
server.port=8095

spring.datasource.url=${spring_datasource_url}
spring.datasource.username=${spring_datasource_username}
spring.datasource.password=${spring_datasource_password}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.rabbitmq.host=${slinkylinky_rabbitmq_host:localhost}
spring.rabbitmq.virtual-host=${slinkylinky_vhost:/}
spring.rabbitmq.username=${slinkylinky_rabbitmq_username:guest}
spring.rabbitmq.password=${slinkylinky_rabbitmq_password:guest}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWK_SET_URI}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
