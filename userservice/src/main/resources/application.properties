spring.application.name=userservice
server.port=8095

spring.datasource.url=${spring_datasource_url}
spring.datasource.username=${spring_datasource_username}
spring.datasource.password=${spring_datasource_password}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.rabbitmq.host=${slinkylinky_rabbitmq_host:localhost}
spring.rabbitmq.virtual-host=${slinkylinky_vhost:/}
spring.rabbitmq.username=${slinkylinky_rabbitmq_username:guest}
spring.rabbitmq.password=${slinkylinky_rabbitmq_password:guest}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWK_SET_URI}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# RabbitMQ routing
rabbitmq.exchange=slinkylinky.exchange
rabbitmq.audit.routingkey=slinkylinky.audit.key

# Keycloak admin client
keycloak.admin.url=${keycloak_admin_url}
keycloak.admin.realm=${keycloak_admin_realm}
keycloak.admin.client-id=${keycloak_admin_client_id}
keycloak.admin.client-secret=${keycloak_admin_client_secret}

# Mail
spring.mail.host=${mail_host}
spring.mail.username=${mail_username}
spring.mail.password=${mail_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=${mail_from}

# Feature flag: set to true in application-local.properties to enable registration during development
accounts.registration.enabled=false

# Public domain (used in email verification links)
slinkylinky.domain=${slinkylinky_domain:http://localhost:3000}
