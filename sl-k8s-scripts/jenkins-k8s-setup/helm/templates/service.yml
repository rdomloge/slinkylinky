{{- $root := . }}
{{- range $service := .Values.services }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $service.name }}
  namespace: {{ $root.Values.tenant }}
  labels:
    app: {{ $service.selectorAppName }}
    {{- range $k, $v := $service.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  selector:
    app: {{ $service.selectorAppName }}
  ports:
    - name: http
      protocol: TCP
      port: {{ $service.port }}
      targetPort: {{ $service.targetPort | default $service.port }}
  type: ClusterIP
{{- end }}