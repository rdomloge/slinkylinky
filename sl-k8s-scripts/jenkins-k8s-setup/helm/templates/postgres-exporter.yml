---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: {{ .Values.tenant }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
      version: v1
  template:
    metadata:
      labels:
        app: postgres-exporter
        version: v1
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          ports:
            - containerPort: 9187
          env:
            - name: DATA_SOURCE_URI
              value: "postgres-service:5432/slinkylinky?sslmode=disable"
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: db-connection-secret
                  key: LINKSERVICE_DB_USERNAME
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: db-connection-secret
                  key: LINKSERVICE_DB_PASSWORD
            - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-service
  namespace: {{ .Values.tenant }}
spec:
  selector:
    app: postgres-exporter
  ports:
    - name: http
      protocol: TCP
      port: 9187
      targetPort: 9187
  type: ClusterIP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: {{ .Values.tenant }}
  labels:
    tenant: {{ .Values.tenant }}
spec:
  selector:
    matchLabels:
      app: postgres-exporter
  namespaceSelector:
    matchNames:
      - {{ .Values.tenant }}
  endpoints:
    - port: http
      interval: 30s
      scrapeTimeout: 10s
