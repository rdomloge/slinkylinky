kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      # Scrape ServiceMonitors across all namespaces so new tenants appear automatically
      serviceMonitorNamespaceSelector: {}
      serviceMonitorSelector: {}
      podMonitorNamespaceSelector: {}
      podMonitorSelector: {}

  grafana:
    adminPassword: "${GRAFANA_ADMIN_PASSWORD}"
    grafana.ini:
      server:
        root_url: "https://grafana.slinkylinky.uk"
    persistence:
      enabled: true
      size: 2Gi
    # Pre-load community dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: imported
            orgId: 1
            folder: SlinkyLinky
            type: file
            disableDeletion: false
            options:
              path: /var/lib/grafana/dashboards/imported
    dashboards:
      imported:
        jvm-micrometer:
          gnetId: 4701
          revision: 9
          datasource: Prometheus
        spring-boot-stats:
          gnetId: 11378
          revision: 1
          datasource: Prometheus
        k8s-pods:
          gnetId: 12117
          revision: 1
          datasource: Prometheus
        postgresql:
          gnetId: 9628
          revision: 7
          datasource: Prometheus
        rabbitmq-overview:
          gnetId: 10991
          revision: 11
          datasource: Prometheus
        node-exporter:
          gnetId: 1860
          revision: 37
          datasource: Prometheus

  alertmanager:
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['namespace', 'alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: slack
      receivers:
        - name: slack
          slack_configs:
            - api_url: "${SLACK_WEBHOOK_URL}"
              channel: '#slinkylinky-alerts'
              title: '[{{ .Status | toUpper }}] {{ .GroupLabels.namespace }} — {{ .GroupLabels.alertname }}'
              text: |
                {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Details:*{{ range .Labels.SortedPairs }} {{ .Name }}: {{ .Value }}{{ end }}
                {{ end }}

  additionalPrometheusRulesMap:
    slinkylinky-rules:
      groups:
        - name: slinkylinky
          rules:
            - alert: PodCrashLooping
              expr: rate(kube_pod_container_status_restarts_total[10m]) > 0
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"

            - alert: ServiceDown
              expr: up == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Service {{ $labels.job }} in {{ $labels.namespace }} is down"

            - alert: HighJvmHeap
              expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.9
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "High JVM heap in {{ $labels.namespace }}/{{ $labels.job }} ({{ $value | humanizePercentage }})"

            - alert: DbConnectionSaturated
              expr: hikaricp_connections_active / hikaricp_connections_max > 0.8
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "DB connections saturated in {{ $labels.namespace }}/{{ $labels.job }}"

            - alert: RabbitQueueBacklog
              expr: rabbitmq_queue_messages_ready > 1000
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "RabbitMQ queue backlog in {{ $labels.namespace }}: {{ $value }} messages"

            - alert: Http5xxRate
              expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High 5xx rate in {{ $labels.namespace }}/{{ $labels.job }}"

  nodeExporter:
    enabled: true

  kubeStateMetrics:
    enabled: true

  prometheusOperator:
    enabled: true
