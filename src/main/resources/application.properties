#spring.main.web-application-type=NONE
logging.level.com.domloge=DEBUG
server.port=${server_port}
spring.data.rest.base-path=/.rest


spring.mail.host=${mail_host}
spring.mail.username=${mail_username}
spring.mail.password=${mail_password}
spring.mail.from=${mail_from}

linkService.baseUrl=${linkservice_baseurl}
slinkyLinky.domain=${slinkylinky_domain}

spring.jpa.hibernate.ddl-auto=create
spring.datasource.url=${spring_datasource_url}
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

#RabbitMQ settings
rabbitmq.host=10.0.0.12
rabbitmq.virtualhost=${slinkylinky_vhost}
rabbitmq.port=15672
rabbitmq.username=CHANGEME
rabbitmq.password=CHANGEME
rabbitmq.exchange=slinkylinky.exchange
rabbitmq.proposals.queue=slinkylinky.proposals.queue
rabbitmq.audit.queue=slinkylinky.audit.queue
rabbitmq.proposals.routingkey=slinkylinky.proposals.key
rabbitmq.audit.routingkey=slinkylinky.audit.key
rabbitmq.reply.timeout=60000
rabbitmq.concurrent.consumers=1
rabbitmq.max.concurrent.consumers=1