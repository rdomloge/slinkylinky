#spring.main.web-application-type=NONE
logging.level.com.domloge=INFO
logging.level.com.domloge.slinkylinky.supplierengagement.scraper=DEBUG
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.security.authentication=DEBUG
logging.level.org.springframework.security.access=DEBUG
logging.level.org.springframework.security.web.authentication.AnonymousAuthenticationFilter=INFO
logging.level.org.springframework.security.web.FilterChainProxy=INFO
logging.level.org.springframework.security.oauth2.server.resource.authentication.JwtAuthenticationProvider=INFO
logging.level.org.springframework.security.oauth2.server.resource.web.authentication.BearerTokenAuthenticationFilter=INFO
logging.level.org.springframework.security.authorization.method.AuthorizationManagerBeforeMethodInterceptor=INFO


server.port=${server_port:8080}
spring.data.rest.base-path=/.rest

# Max file size.
spring.servlet.multipart.max-file-size=10MB
# Max request size.
spring.servlet.multipart.max-request-size=12MB

## CURRENTLY USING AMAZON SES
spring.mail.host=${mail_host}
spring.mail.username=${mail_username}
spring.mail.password=${mail_password}
spring.mail.from=${mail_from}
spring.mail.testing.addresses=${spring_mail_testing_addresses:rdomloge@gmail.com}
spring.mail.requestsignoff=${mail_requestsignoff}
spring.mail.requestcontact=${mail_requestcontact}
spring.mail.declinedWarning.addresses=${mail_declined_warning_addresses}
spring.mail.declineEmailRecipientName=${mail_declineEmailRecipientName}
spring.mail.expiredWarning.addresses=${mail_expiredWarningAddresses}
spring.mail.bccRecipients=${mail_bccRecipients}
spring.mail.testing=${spring_mail_testing}

# Expose only core actuator endpoints in shared environments
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true

linkService.baseUrl=${linkservice_baseurl}
slinkyLinky.domain=${slinkylinky_domain}

# Path to system Chromium binary; leave empty to use Playwright's managed browser (local dev)
collaborator.browser.path=${collaborator_browser_path:}
collaborator.project.id=${collaborator_project_id:128180}
# Max items to scrape per run. 0 = unlimited (production default).
collaborator.scrape.limit=${collaborator_scrape_limit:0}
# Raw Cookie header value from Chrome DevTools after a manual login (bypasses Cloudflare challenge).
# Leave empty to fall back to automated login.
collaborator.session.cookies=${collaborator_session_cookies:}
# Base URL of a FlareSolverr instance used to bypass Cloudflare Turnstile on collaborator.pro.
# Run locally: docker run -d -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
# In K8s: deployed as a sidecar in the supplierengagement pod (see supplierengagement.yml).
# Leave empty to skip the bypass and attempt plain headless login.
collaborator.flaresolverr.url=${collaborator_flaresolverr_url:}

keycloak.clientcredentials.client.id=${keycloak_clientcredentials_client_id}
keycloak.clientcredentials.client.secret=${keycloak_clientcredentials_client_secret}
keycloak.base.url=${keycloak_base_url}
keycloak.clientcredentials.token.uri=${keycloak_clientcredentials_token_uri}

#spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.datasource.url=${spring_datasource_url}
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

#RabbitMQ settings
rabbitmq.host=${slinkylinky_rabbitmq_host:rabbit-service}
rabbitmq.virtualhost=${slinkylinky_vhost:slinkylinky}
rabbitmq.port=5672
rabbitmq.username=${slinkylinky_rabbitmq_username}
rabbitmq.password=${slinkylinky_rabbitmq_password}
rabbitmq.exchange=slinkylinky.exchange
rabbitmq.audit.queue=slinkylinky.audit.queue
rabbitmq.audit.routingkey=slinkylinky.audit.key
rabbitmq.supplierengagement.proposals.queue=slinkylinky.proposals.supplierengagement
rabbitmq.proposals.exchange=slinkylinky.proposals.exchange
rabbitmq.supplierengagement.queue=slinkylinky.supplierengagement.queue
rabbitmq.supplierengagement.routingkey=slinkylinky.supplierengagement.key
rabbitmq.reply.timeout=60000
rabbitmq.concurrent.consumers=1
rabbitmq.max.concurrent.consumers=1