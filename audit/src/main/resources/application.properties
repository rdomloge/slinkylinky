spring.data.rest.base-path=/.rest
server.port=${server_port:8080}

#spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
logging.level.com.domloge=DEBUG

spring.datasource.url=${spring_datasource_url:jdbc:h2:mem:auditdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

# Expose only core actuator endpoints in shared environments
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true

#RabbitMQ settings
rabbitmq.host=${slinkylinky_rabbitmq_host:rabbit-service}
rabbitmq.virtualhost=${slinkylinky_vhost:slinkylinky}
rabbitmq.port=15672
rabbitmq.username=${slinkylinky_rabbitmq_username:guest}
rabbitmq.password=${slinkylinky_rabbitmq_password:guest}
rabbitmq.exchange=slinkylinky.exchange
rabbitmq.reply.timeout=60000
rabbitmq.concurrent.consumers=1
rabbitmq.max.concurrent.consumers=1

rabbitmq.audit.queue=slinkylinky.audit.queue
rabbitmq.audit.routingkey=slinkylinky.audit.key